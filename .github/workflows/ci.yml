name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  python:
    name: Python service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pythonML
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pythonML/req.txt

      - name: Install dependencies
        run: pip install -r req.txt

      - name: Compile Python modules
        run: python -m py_compile weather_ml.py weather_station.py websocketService.py initialize_model_py.py

  spring:
    name: Spring Boot service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webSocketServer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

  frontend:
    name: React dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webSocketServer/src/main/client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webSocketServer/src/main/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker:
    name: Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose file
        run: docker compose config
